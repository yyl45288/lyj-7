<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波次管理 - 仓储波次拣货系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <h2>📦 波次拣货系统</h2>
            </div>
            <nav class="nav-menu">
                <a href="/" class="nav-item" data-page="dashboard">
                    <span class="nav-icon">📊</span>
                    <span>可视化面板</span>
                </a>
                <a href="/orders" class="nav-item" data-page="orders">
                    <span class="nav-icon">📋</span>
                    <span>订单管理</span>
                </a>
                <a href="/inventory" class="nav-item" data-page="inventory">
                    <span class="nav-icon">📦</span>
                    <span>库存管理</span>
                </a>
                <a href="/waves" class="nav-item active" data-page="waves">
                    <span class="nav-icon">🌊</span>
                    <span>波次管理</span>
                </a>
                <a href="/picking" class="nav-item" data-page="picking">
                    <span class="nav-icon">🛒</span>
                    <span>拣货任务</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>波次管理</h1>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="showCreateWaveModal()">+ 创建波次</button>
                </div>
            </header>

            <div id="content" class="content">
            </div>
        </main>
    </div>

    <div id="wave-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>创建波次</h3>
                <span class="close" onclick="closeWaveModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>波次类型</label>
                    <select id="wave-type">
                        <option value="NORMAL">普通波次</option>
                        <option value="URGENT">紧急波次</option>
                        <option value="BULK">大宗波次</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>最大订单数</label>
                    <input type="number" id="wave-max-orders" value="10" min="1">
                </div>
                <div class="form-group">
                    <label>区域</label>
                    <input type="text" id="wave-zone" placeholder="可选，例如：A区">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeWaveModal()">取消</button>
                <button class="btn btn-primary" onclick="createWave()">创建</button>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadWaves();
        });
    </script>
</body>
</html>
