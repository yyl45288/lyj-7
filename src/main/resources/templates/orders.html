<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理 - 仓储波次拣货系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <h2>📦 波次拣货系统</h2>
            </div>
            <nav class="nav-menu">
                <a href="/" class="nav-item" data-page="dashboard">
                    <span class="nav-icon">📊</span>
                    <span>可视化面板</span>
                </a>
                <a href="/orders" class="nav-item active" data-page="orders">
                    <span class="nav-icon">📋</span>
                    <span>订单管理</span>
                </a>
                <a href="/inventory" class="nav-item" data-page="inventory">
                    <span class="nav-icon">📦</span>
                    <span>库存管理</span>
                </a>
                <a href="/waves" class="nav-item" data-page="waves">
                    <span class="nav-icon">🌊</span>
                    <span>波次管理</span>
                </a>
                <a href="/picking" class="nav-item" data-page="picking">
                    <span class="nav-icon">🛒</span>
                    <span>拣货任务</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>订单管理</h1>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="showCreateOrderModal()">+ 创建订单</button>
                </div>
            </header>

            <div id="content" class="content">
            </div>
        </main>
    </div>

    <div id="order-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>创建订单</h3>
                <span class="close" onclick="closeOrderModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>客户名称 *</label>
                    <input type="text" id="order-customer" placeholder="请输入客户名称">
                </div>
                <div class="form-group">
                    <label>地址</label>
                    <input type="text" id="order-address" placeholder="请输入地址">
                </div>
                <div class="form-group">
                    <label>电话</label>
                    <input type="text" id="order-phone" placeholder="请输入电话">
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="order-urgent"> 紧急订单
                    </label>
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <textarea id="order-remark" rows="2" placeholder="请输入备注"></textarea>
                </div>
                <div class="form-group">
                    <label>订单项 *</label>
                    <div id="order-items-container">
                    </div>
                    <button class="btn btn-outline" onclick="addOrderItem()" style="margin-top:8px;">+ 添加商品</button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeOrderModal()">取消</button>
                <button class="btn btn-primary" onclick="createOrder()">创建</button>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadOrders();
        });
    </script>
</body>
</html>
