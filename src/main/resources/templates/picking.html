<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拣货任务 - 仓储波次拣货系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <h2>📦 波次拣货系统</h2>
            </div>
            <nav class="nav-menu">
                <a href="/" class="nav-item" data-page="dashboard">
                    <span class="nav-icon">📊</span>
                    <span>可视化面板</span>
                </a>
                <a href="/orders" class="nav-item" data-page="orders">
                    <span class="nav-icon">📋</span>
                    <span>订单管理</span>
                </a>
                <a href="/inventory" class="nav-item" data-page="inventory">
                    <span class="nav-icon">📦</span>
                    <span>库存管理</span>
                </a>
                <a href="/waves" class="nav-item" data-page="waves">
                    <span class="nav-icon">🌊</span>
                    <span>波次管理</span>
                </a>
                <a href="/picking" class="nav-item active" data-page="picking">
                    <span class="nav-icon">🛒</span>
                    <span>拣货任务</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>拣货任务</h1>
                <div class="header-actions">
                    <div class="filter-group">
                        <label>状态：</label>
                        <select id="task-status-filter" onchange="filterTasks()">
                            <option value="all">全部</option>
                            <option value="PENDING">待分配</option>
                            <option value="ASSIGNED">已分配</option>
                            <option value="PICKING">拣货中</option>
                            <option value="COMPLETED">已完成</option>
                        </select>
                    </div>
                </div>
            </header>

            <div id="content" class="content">
            </div>
        </main>
    </div>

    <div id="task-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>任务操作</h3>
                <span class="close" onclick="closeTaskModal()">&times;</span>
            </div>
            <div class="modal-body" id="task-modal-body">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeTaskModal()">关闭</button>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadPickingTasks();
        });
    </script>
</body>
</html>
