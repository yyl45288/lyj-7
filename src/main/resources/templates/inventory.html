<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>库存管理 - 仓储波次拣货系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <h2>📦 波次拣货系统</h2>
            </div>
            <nav class="nav-menu">
                <a href="/" class="nav-item" data-page="dashboard">
                    <span class="nav-icon">📊</span>
                    <span>可视化面板</span>
                </a>
                <a href="/orders" class="nav-item" data-page="orders">
                    <span class="nav-icon">📋</span>
                    <span>订单管理</span>
                </a>
                <a href="/inventory" class="nav-item active" data-page="inventory">
                    <span class="nav-icon">📦</span>
                    <span>库存管理</span>
                </a>
                <a href="/waves" class="nav-item" data-page="waves">
                    <span class="nav-icon">🌊</span>
                    <span>波次管理</span>
                </a>
                <a href="/picking" class="nav-item" data-page="picking">
                    <span class="nav-icon">🛒</span>
                    <span>拣货任务</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>库存管理</h1>
                <div class="header-actions">
                    <div class="filter-group">
                        <label>筛选：</label>
                        <select id="inventory-filter" onchange="filterInventory()">
                            <option value="all">全部</option>
                            <option value="low">低库存</option>
                            <option value="normal">正常</option>
                        </select>
                    </div>
                </div>
            </header>

            <div id="content" class="content">
            </div>
        </main>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadInventory();
        });
    </script>
</body>
</html>
